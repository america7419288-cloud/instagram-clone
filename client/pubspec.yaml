name: instagram_client
description: "A Instagram clone."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2

  
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  image_cropper: ^12.2.1
  photo_view: ^0.15.0
  flutter_svg: ^2.0.9
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  smooth_page_indicator: ^2.0.1
  video_player: ^2.8.1
  visibility_detector: ^0.4.0+2
  flutter_slidable: ^3.0.0


  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  
  socket_io_client: ^3.1.4

  timeago: ^3.6.0
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^12.0.2
  flutter_dotenv: ^6.0.1
  connectivity_plus: ^7.1.1
  infinite_scroll_pagination: ^5.1.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  phosphor_flutter: ^2.1.0
  flutter_staggered_grid_view: ^0.7.0
  photo_manager: 3.9.0
  photo_manager_image_provider: 2.2.0
  colorfilter_generator: ^0.0.8
  just_audio: ^0.10.5
  youtube_explode_dart: ^3.0.5
  flutter_lucide: ^1.11.0
  iconsax_flutter: ^1.0.1
  camera: ^0.12.0+1
  path_provider: ^2.1.5
  path: ^1.9.1
  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.7
  hive_ce_generator: ^1.11.0

flutter:
  uses-material-design: true

  assets:
     - assets/images/
     - assets/extra_icons/
     - assets/icons/
     - assets/animations/
     - assets/animations/raw/
     - assets/animations/drawable/
     - assets/animations/animator/
     - assets/sounds/
     - .env


  fonts:
     - family: Billabong
       fonts:
         - asset: assets/fonts/Billabong.ttf
     - family: SF-Pro
       fonts:
         - asset: assets/fonts/SF-Pro.ttf
     - family: Instagram-Sans
       fonts:
         - asset: assets/fonts/Instagram-Sans.ttf
