name: instagram_clinet
description: "A Instagram clone."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.2              # Page routing (like React Router)

  flutter_riverpod: ^3.3.1        # State management (recommended)
  riverpod_annotation: ^4.0.2

  dio: ^5.4.0                     # HTTP client (like Axios)
  pretty_dio_logger: ^1.3.1       # Log API calls beautifully

  flutter_secure_storage: ^10.0.0  # Store JWT token securely
  shared_preferences: ^2.2.2      # Store simple data

  
  cached_network_image: ^3.3.0    # Cache & display images
  image_picker: ^1.0.7            # Pick from gallery/camera
  image_cropper: ^12.2.1           # Crop images
  photo_view: ^0.15.0             # Pinch-to-zoom images
  flutter_svg: ^2.0.9             # SVG icons
  shimmer: ^3.0.0                 # Loading skeleton effect
  lottie: ^3.0.0                  # Animations
  smooth_page_indicator: ^2.0.1   # Dots indicator for carousels

  flutter_form_builder: ^10.3.0+2    # Form handling
  form_builder_validators: ^11.3.0 # Form validation

  
  socket_io_client: ^3.1.4      # WebSocket for DMs & notifications

  timeago: ^3.6.0                 # "2 hours ago" formatting
  intl: ^0.20.2                   # Date formatting
  url_launcher: ^6.2.4            # Open URLs
  share_plus: ^12.0.2              # Share posts
  flutter_dotenv: ^6.0.1          # Environment variables
  connectivity_plus: ^7.1.1       # Check internet connection
  infinite_scroll_pagination: ^5.1.1 # Infinite scroll lists

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.7

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
     - assets/images/
     - assets/icons/


  fonts:
     - family: Billabong
       fonts:
         - asset: assets/fonts/Billabong.ttf
